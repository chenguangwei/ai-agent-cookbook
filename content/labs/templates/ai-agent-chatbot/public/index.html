<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0; height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      padding: 16px 24px; border-bottom: 1px solid #1e293b;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 12px; color: #64748b; }
    #messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .msg {
      max-width: 80%; padding: 12px 16px; border-radius: 12px;
      font-size: 14px; line-height: 1.6; white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #3b82f6; color: white; border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e293b; border-bottom-left-radius: 4px;
    }
    .msg.tool {
      align-self: flex-start; font-size: 12px;
      background: #0c1425; border: 1px solid #1e293b;
      color: #22d3ee; font-family: monospace;
    }
    #input-area {
      padding: 16px 24px; border-top: 1px solid #1e293b;
      display: flex; gap: 12px;
    }
    #input {
      flex: 1; padding: 12px 16px; border-radius: 12px;
      border: 1px solid #334155; background: #1e293b;
      color: #e2e8f0; font-size: 14px; outline: none;
    }
    #input:focus { border-color: #3b82f6; }
    button {
      padding: 12px 24px; border-radius: 12px; border: none;
      background: #3b82f6; color: white; font-weight: 600;
      cursor: pointer; font-size: 14px;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #334155; cursor: not-allowed; }
    .typing { color: #64748b; font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>AI Agent Chatbot</h1>
    <span>Tools: Weather | Calculator | Knowledge Search</span>
  </header>

  <div id="messages">
    <div class="msg assistant">
      Hello! I'm an AI agent with tool-calling capabilities. Try asking me:
      - "What's the weather in Tokyo?"
      - "Calculate 15% tip on $85.50"
      - "What are AI agents?"
    </div>
  </div>

  <div id="input-area">
    <input id="input" type="text" placeholder="Type your message..." autocomplete="off" />
    <button id="send" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    let history = [];

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = content;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = '';
      sendBtn.disabled = true;
      addMessage('user', message);

      const typing = document.createElement('div');
      typing.className = 'msg assistant typing';
      typing.textContent = 'Thinking...';
      messagesEl.appendChild(typing);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history }),
        });
        const data = await res.json();

        typing.remove();

        if (data.error) {
          addMessage('assistant', `Error: ${data.error}`);
        } else {
          addMessage('assistant', data.reply);
          // Keep last 10 messages for context
          history = data.messages.slice(-10);
        }
      } catch (err) {
        typing.remove();
        addMessage('assistant', `Network error: ${err.message}`);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
