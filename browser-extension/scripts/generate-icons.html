<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Open this file in a browser, right-click each canvas below and "Save Image As..." to create the icon PNGs.</p>
<h3>icon16.png</h3><canvas id="c16" width="16" height="16"></canvas>
<h3>icon48.png</h3><canvas id="c48" width="48" height="48"></canvas>
<h3>icon128.png</h3><canvas id="c128" width="128" height="128"></canvas>
<script>
function drawIcon(canvasId, size) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  // Background circle
  ctx.fillStyle = '#2563eb';
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
  ctx.fill();
  // Text
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size * 0.45}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('AH', size/2, size/2 + size*0.02);
}
drawIcon('c16', 16);
drawIcon('c48', 48);
drawIcon('c128', 128);
</script>
</body>
</html>
